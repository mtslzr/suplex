server {
    listen 3003;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy GraphQL to API
    location /graphql {
        proxy_pass http://api:8083/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /graphiql {
        proxy_pass http://api:8083/graphiql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy REST API endpoints
    location /api/ {
        proxy_pass http://api:8083/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Scrape runs can take minutes across many promotions
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
